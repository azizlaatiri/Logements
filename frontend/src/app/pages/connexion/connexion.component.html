<div class="conteneur-page conteneur-formulaire">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Connexion</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="formulaire" (ngSubmit)="soumettre()">
        <mat-form-field class="champ-pleine-largeur" appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" required />
        </mat-form-field>

        <mat-form-field class="champ-pleine-largeur" appearance="outline">
          <mat-label>Mot de passe</mat-label>
          <input matInput type="password" formControlName="motDePasse" required />
        </mat-form-field>

        @if (erreur()) {
          <p class="message-erreur">{{ erreur() }}</p>
        }

        <button mat-raised-button color="primary" class="champ-pleine-largeur" type="submit" [disabled]="formulaire.invalid || enCours()">
          @if (enCours()) {
            <mat-spinner diameter="20" />
          } @else {
            Se connecter
          }
        </button>
      </form>
    </mat-card-content>

    <mat-card-footer>
      <p class="lien-secondaire">Pas encore de compte ? <a routerLink="/inscription">S'inscrire</a></p>
    </mat-card-footer>
  </mat-card>
</div>
